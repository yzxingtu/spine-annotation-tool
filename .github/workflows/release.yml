name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------
  # 校验 tag 与 pyproject 版本一致
  # ---------------------------------------------------------------
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 解析并校验版本
        id: parse
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          python3 - <<'PY'
          import os, re, sys
          from pathlib import Path

          tag = os.environ["GIT_TAG"]
          if not tag.startswith("v"):
              sys.exit(f"Tag 必须以 v 开头, 当前: {tag}")
          tag_version = tag[1:]

          # pyproject.toml
          pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
          m = re.search(r'^version\s*=\s*"([^"]+)"', pyproject, re.M)
          if not m:
              sys.exit("无法在 pyproject.toml 中找到 version")
          pkg_version = m.group(1)

          # __init__.py
          init_file = Path("src/spine_annotator/__init__.py").read_text(encoding="utf-8")
          m2 = re.search(r'__version__\s*=\s*"([^"]+)"', init_file)
          if not m2:
              sys.exit("无法在 __init__.py 中找到 __version__")
          init_version = m2.group(1)

          if pkg_version != tag_version or init_version != tag_version:
              sys.exit(
                  f"版本不一致: tag={tag_version}, pyproject={pkg_version}, "
                  f"__init__.py={init_version}"
              )

          print(f"版本检查通过: {tag_version}")
          gh_out = os.environ.get("GITHUB_OUTPUT")
          if gh_out:
              with open(gh_out, "a", encoding="utf-8") as f:
                  f.write(f"version={tag_version}\n")
          PY

  # ---------------------------------------------------------------
  # 构建 Windows / macOS 版本
  # ---------------------------------------------------------------
  build:
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: X光脊柱标注工具-windows
            ext: ".exe"
          - os: macos-latest
            artifact_name: X光脊柱标注工具-macos
            ext: ".app"
    runs-on: ${{ matrix.os }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 升级 pip
        run: python -m pip install --upgrade pip

      - name: 安装项目依赖
        run: |
          pip install PyQt5>=5.15.0 numpy>=1.21.0 opencv-python-headless>=4.5.0 Pillow>=9.0.0
          pip install onnxruntime>=1.17
          pip install spine-infer>=0.2.0
          pip install pyinstaller>=6.0

      # ---------- Windows 打包 ----------
      - name: 打包 Windows (.exe)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          pyinstaller --noconfirm --clean \
            --name "X光脊柱标注工具" \
            --windowed \
            --paths src \
            --collect-submodules spine_annotator \
            --collect-all onnxruntime \
            --additional-hooks-dir hooks \
            main.py

      - name: 压缩 Windows 产物
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd dist
          $folder = "X光脊柱标注工具"
          $version = "${{ needs.verify-version.outputs.version }}"
          $zipName = "X光脊柱标注工具 v$version-windows.zip"
          Compress-Archive -Path $folder -DestinationPath $zipName -Force
          Get-ChildItem

      # ---------- macOS 打包 ----------
      - name: 打包 macOS (.app)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --noconfirm --clean \
            --name "X光脊柱标注工具" \
            --windowed \
            --paths src \
            --collect-submodules spine_annotator \
            --collect-all onnxruntime \
            --additional-hooks-dir hooks \
            main.py

      # ---------- macOS ad-hoc 签名（免费，避免“应用已损坏”）----------
      - name: ad-hoc 签名 (macOS)
        if: runner.os == 'macOS'
        run: |
          # 使用 ad-hoc 身份对 .app 进行递归签名
          # 注意：PyInstaller 产出的 .app 可能含多个未签名的 dylib/Framework，
          # 需要 --deep 递归签名，--force 覆盖已有签名。
          codesign --force --deep --sign - "dist/X光脊柱标注工具.app"

          echo "---- 验证签名 ----"
          codesign --verify --verbose=2 "dist/X光脊柱标注工具.app" || true
          codesign -dv --verbose=2 "dist/X光脊柱标注工具.app" || true

      - name: 压缩 macOS .app
        if: runner.os == 'macOS'
        run: |
          cd dist
          # 使用 ditto 代替 zip，保留权限与扩展属性（仅签名不会失效）
          ditto -c -k --keepParent "X光脊柱标注工具.app" "X光脊柱标注工具 v${{ needs.verify-version.outputs.version }}-macos.zip"
          ls -la

      # ---------- 上传 artifact ----------
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/X光脊柱标注工具 *-windows.zip
            dist/X光脊柱标注工具 *-macos.zip
          if-no-files-found: ignore
          retention-days: 7

  # ---------------------------------------------------------------
  # 创建 GitHub Release 并附加产物
  # ---------------------------------------------------------------
  release:
    needs: [verify-version, build]
    runs-on: ubuntu-latest
    steps:
      - name: 下载所有 artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 列出产物
        run: ls -R artifacts

      - name: 创建/更新 Release 并上传资产
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/X光脊柱标注工具 *-windows.zip
            artifacts/**/X光脊柱标注工具 *-macos.zip
          generate_release_notes: true
          name: "X光脊柱标注工具 v${{ needs.verify-version.outputs.version }}"
          append_body: true
          body: |
            ## 下载与使用

            ### Windows
            下载 `X光脊柱标注工具 *-windows.zip` 解压后，双击 `X光脊柱标注工具.exe` 运行。
            
            ### macOS
            本包采用 **ad-hoc 签名**（未经 Apple 公证）。首次打开会提示"无法验证开发者"，请按以下任一方式处理：
            
            **推荐（一行命令解决）：**
            ```bash
            # 解压后执行（以实际路径为准）
            xattr -cr ~/Downloads/X光脊柱标注工具.app
            open ~/Downloads/X光脊柱标注工具.app
            ```
            
            **或者手动信任：**
            1. 在 Finder 中 **右键** 点击 `X光脊柱标注工具.app` → 选择 **打开**
            2. 弹出警告后点击 **打开** 确认
            3. 后续双击即可正常运行

            > 原因：macOS Gatekeeper 会拦截从网络下载、未经 Apple Notarization 公证的应用。
            > 本项目为内部工具，暂未申请 Apple Developer ID。
